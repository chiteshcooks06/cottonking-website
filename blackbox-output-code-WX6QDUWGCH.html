<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CottonKing - Premium Cotton Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --black: #1a1a1a;
            --beige: #f5f3f0;
            --gold: #d4af37;
            --gold-light: #e8d5a3;
            --gray-light: #f8f8f8;
            --gray: #666;
            --shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: var(--black);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--black);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-icons i {
            font-size: 1.2rem;
            color: var(--black);
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-icons i:hover {
            color: var(--gold);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--gold);
            color: var(--black);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--black);
            margin: 3px 0;
            transition: 0.3s;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%23f5f3f0" width="1200" height="800"/><path fill="%23d4af37" opacity="0.1" d="M0 400Q300 200 600 400T1200 400V800H0z"/></svg>');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            position: relative;
        }

        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 1s ease 0.5s forwards;
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease 0.8s forwards;
        }

        .cta-button {
            display: inline-block;
            background: var(--gold);
            color: var(--black);
            padding: 1rem 2.5rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease 1.1s forwards;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        /* Sections */
        .section {
            padding: 100px 0;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 4rem;
            color: var(--black);
        }

        /* Featured Collections */
        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .collection-card {
            position: relative;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        .collection-card:hover {
            transform: translateY(-20px);
            box-shadow: var(--shadow);
        }

        .collection-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .collection-card:hover img {
            transform: scale(1.1);
        }

        .collection-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 2rem;
            transform: translateY(100%);
            transition: transform 0.5s ease;
        }

        .collection-card:hover .collection-overlay {
            transform: translateY(0);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-15px);
            box-shadow: var(--shadow);
        }

        .product-image {
            height: 300px;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-category {
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--black);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: var(--beige);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--gold);
            color: var(--black);
        }

        /* Reviews */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stars {
            color: var(--gold);
            margin-bottom: 1rem;
        }

        /* Product Page */
        .product-page {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
            padding: 120px 2rem;
        }

        .product-images {
            display: flex;
            gap: 1rem;
        }

        .product-main-image {
            flex: 2;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
        }

        .product-thumbnails {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .thumbnail {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border 0.3s ease;
        }

        .thumbnail.active {
            border-color: var(--gold);
        }

        .product-details h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .product-price-large {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        .add-to-cart {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-right: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .add-to-cart:hover {
            background: var(--gold);
            color: var(--black);
        }

        .sizes {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
        }

        .size-btn {
            width: 50px;
            height: 50px;
            border: 2px solid var(--gray-light);
            background: var(--white);
            border-radius: 50%;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .size-btn.active {
            border-color: var(--gold);
            background: var(--gold);
            color: var(--white);
        }

        /* Cart */
        .cart {
            padding: 120px 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .cart-item {
            display: flex;
            gap: 2rem;
            padding: 2rem 0;
            border-bottom: 1px solid var(--gray-light);
        }

        .cart-item-image {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
        }

        .cart-item-info h3 {
            margin-bottom: 0.5rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--gray-light);
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
        }

        .cart-total {
            text-align: right;
            margin-top: 2rem;
        }

        .checkout-btn {
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 1.5rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        /* About & Contact */
        .about-content,
        .contact-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 3rem;
        }

        .contact-form {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gray-light);
            border-radius: 12px;
            font-family: inherit;
            transition: border 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .submit-btn {
            background: var(--gold);
            color: var(--black);
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        /* Map */
        .map-container {
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* Footer */
        .footer {
            background: var(--black);
            color: var(--white);
            padding: 4rem 2rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                display: none;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .product-page {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }

            .collections-grid,
            .products-grid {
                grid-template-columns: 1fr;
            }

            .section {
                padding: 60px 1rem;
            }
        }

        /* Mobile Navbar */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#home" class="logo">CottonKing</a>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fas fa-search" onclick="toggleSearch()"></i>
                <i class="fas fa-heart" onclick="toggleWishlist()"></i>
                <i class="fas fa-shopping-cart" onclick="toggleCart()">
                    <span class="cart-count" id="cartCount">0</span>
                </i>
                <div class="hamburger" onclick="toggleMobileMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </
